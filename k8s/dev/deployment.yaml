apiVersion: apps/v1
kind: Deployment
metadata:
  name: callforge-backend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: callforge-backend
  template:
    metadata:
      labels:
        app: callforge-backend
    spec:
      containers:
        - name: backend
          image: adenli/callforge-backend:4307d98
          imagePullPolicy: Always
          ports:
            - containerPort: 9090

---
apiVersion: v1
kind: Service
metadata:
  name: callforge-backend
  namespace: dev
spec:
  type: ClusterIP
  selector:
    app: callforge-backend
  ports:
    - port: 80
      targetPort: 9090

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: callforge-backend
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
    - host: api.callforge.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: callforge-backend
                port:
                  number: 80